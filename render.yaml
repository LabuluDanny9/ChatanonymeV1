# Render - Blueprint ChatAnonyme
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: chatanonyme-backend
    runtime: node
    rootDir: backend

    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        value: admin@silencehub.local
      - key: ADMIN_PASSWORD
        sync: false
